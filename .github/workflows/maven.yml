name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Deploy to Tomcat Server
      env:
        TOMCAT_USERNAME: ${{ secrets.TOMCAT_USERNAME }}
        TOMCAT_PASSWORD: ${{ secrets.TOMCAT_PASSWORD }}
        TOMCAT_URL: 'https://camera-voter-acorn.ngrok-free.dev/manager/text'

    - name: Deploy to Tomcat Server
      run: |
        mvn tomcat:redeploy \
        -Dmaven.tomcat.url=$TOMCAT_URL \
        -Dmaven.tomcat.username=$TOMCAT_USERNAME \
        -Dmaven.tomcat.password=$TOMCAT_PASSWORD \
        -DskipTests